<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟主播 - 小悠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffd93d;
        }

        .panel-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border-radius: 10px;
        }

        /* 弹幕区 */
        .danmu-list {
            height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .danmu-item {
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .danmu-user {
            color: #ff6b6b;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .danmu-content {
            color: #fff;
            margin-bottom: 8px;
        }

        .danmu-reply {
            color: #4ade80;
            padding: 8px 12px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* 回复区 */
        .response-list {
            height: 200px;
            overflow-y: auto;
        }

        .response-item {
            padding: 12px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #4ade80;
        }

        .response-text {
            color: #fff;
            margin-bottom: 8px;
        }

        .audio-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #4ade80;
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }

        .audio-btn:hover {
            transform: scale(1.05);
        }

        .audio-btn.playing {
            background: #ff6b6b;
            color: #fff;
        }

        /* 输入区 */
        .input-section {
            grid-column: 1 / -1;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-field {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #ffd93d;
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 角色展示 */
        .avatar-section {
            text-align: center;
            padding: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .avatar-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffd93d;
        }

        .avatar-status {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        /* 统计 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
            grid-column: 1 / -1;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(74, 222, 128, 0.9);
            color: #fff;
            border-radius: 10px;
            font-weight: 500;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: rgba(239, 68, 68, 0.9);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ 虚拟主播控制台</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot"></span>
                    <span>API 已连接</span>
                </div>
                <div class="status-item">
                    <span>🔊 语音: 小悠</span>
                </div>
            </div>
        </header>

        <div class="main-grid">
            <!-- 弹幕列表 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">📺 弹幕列表</span>
                    <span class="panel-badge" id="danmuCount">0 条</span>
                </div>
                <div class="danmu-list" id="danmuList">
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 50px;">
                        暂无弹幕，发送一条试试吧~
                    </div>
                </div>
            </div>

            <!-- AI 回复 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">🤖 AI 回复</span>
                    <span class="panel-badge" id="replyCount">0 条</span>
                </div>
                <div class="response-list" id="responseList">
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 50px;">
                        等待弹幕...
                    </div>
                </div>
            </div>

            <!-- 角色展示 -->
            <div class="panel avatar-section">
                <div class="avatar">👧</div>
                <div class="avatar-name">小悠</div>
                <div class="avatar-status" id="avatarStatus">正在等待互动...</div>
            </div>

            <!-- 控制面板 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">⚙️ 控制面板</span>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">API 地址</label>
                    <input type="text" class="input-field" id="apiUrl" value="https://web-production-e8e65f.up.railway.app" style="font-size: 0.9rem;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">自动播放语音</label>
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="autoPlay" checked style="width: 20px; height: 20px;">
                        <span style="color: rgba(255,255,255,0.7);">收到回复自动播放</span>
                    </label>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="testConnection()" style="flex: 1;">
                        🔄 测试连接
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()" style="flex: 1;">
                        🗑️ 清空
                    </button>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="panel input-section">
                <div class="panel-header">
                    <span class="panel-title">💬 发送测试弹幕</span>
                </div>
                <div class="input-group">
                    <input type="text" class="input-field" id="usernameInput" placeholder="用户名" value="测试观众">
                    <input type="text" class="input-field" id="danmuInput" placeholder="输入弹幕内容...">
                    <button class="btn btn-primary" onclick="sendDanmu()">
                        🚀 发送
                    </button>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="quickSend('你好呀')">👋 你好</button>
                    <button class="btn btn-secondary" onclick="quickSend('你叫什么名字')">❓ 问名字</button>
                    <button class="btn btn-secondary" onclick="quickSend('你好可爱')">❤️ 夸赞</button>
                    <button class="btn btn-secondary" onclick="quickSend('今天玩什么游戏')">🎮 问游戏</button>
                    <button class="btn btn-secondary" onclick="quickSend('你好棒呀')">⭐ 表扬</button>
                </div>
            </div>

            <!-- 统计 -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalDanmu">0</div>
                    <div class="stat-label">弹幕总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalReply">0</div>
                    <div class="stat-label">回复总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalAudio">0</div>
                    <div class="stat-label">播放语音</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="onlineTime">00:00</div>
                    <div class="stat-label">在线时长</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div class="notification" id="notification"></div>

    <script>
        // 配置
        let apiUrl = 'https://web-production-e8e65f.up.railway.app';
        let autoPlay = true;
        
        // 统计
        let stats = {
            danmu: 0,
            reply: 0,
            audio: 0,
            startTime: Date.now()
        };

        // 当前播放的音频
        let currentAudio = null;

        // 通知
        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification show' + (isError ? ' error' : '');
            setTimeout(() => {
                notif.className = 'notification';
            }, 3000);
        }

        // 获取 API 地址
        function getApiUrl() {
            return document.getElementById('apiUrl').value.replace(/\/$/, '');
        }

        // 测试连接
        async function testConnection() {
            try {
                const res = await fetch(`${getApiUrl()}/api/status`);
                if (res.ok) {
                    const data = await res.json();
                    showNotification(`✅ 连接成功！服务状态: ${data.status}`);
                } else {
                    showNotification('❌ 连接失败', true);
                }
            } catch (e) {
                showNotification('❌ 无法连接到服务器', true);
            }
        }

        // 发送弹幕
        async function sendDanmu() {
            const username = document.getElementById('usernameInput').value || '匿名用户';
            const content = document.getElementById('danmuInput').value.trim();
            
            if (!content) {
                showNotification('请输入弹幕内容', true);
                return;
            }

            // 添加到弹幕列表
            addDanmuItem(username, content);
            document.getElementById('danmuInput').value = '';

            // 更新状态
            document.getElementById('avatarStatus').textContent = '正在思考回复...';

            try {
                const res = await fetch(`${getApiUrl()}/api/danmu`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, content })
                });

                const data = await res.json();
                
                if (data.success) {
                    const reply = data.data.text;
                    addResponseItem(reply);
                    updateAvatarStatus(username, content);
                    
                    // 自动播放语音
                    if (autoPlay) {
                        playAudio(data.data.audio);
                    }
                } else {
                    showNotification('处理失败', true);
                }
            } catch (e) {
                showNotification('发送失败: ' + e.message, true);
                document.getElementById('avatarStatus').textContent = '连接异常...';
            }
        }

        // 快捷发送
        function quickSend(content) {
            document.getElementById('danmuInput').value = content;
            sendDanmu();
        }

        // 添加弹幕项
        function addDanmuItem(username, content) {
            const list = document.getElementById('danmuList');
            
            // 清空空状态提示
            if (stats.danmu === 0) {
                list.innerHTML = '';
            }

            const item = document.createElement('div');
            item.className = 'danmu-item';
            item.innerHTML = `
                <div class="danmu-user">@${escapeHtml(username)}</div>
                <div class="danmu-content">${escapeHtml(content)}</div>
                <div class="danmu-reply" id="reply-${Date.now()}">🤔 等待AI回复...</div>
            `;
            
            list.insertBefore(item, list.firstChild);
            
            // 更新统计
            stats.danmu++;
            document.getElementById('totalDanmu').textContent = stats.danmu;
            document.getElementById('danmuCount').textContent = `${stats.danmu} 条`;
        }

        // 添加回复项
        function addResponseItem(text, audioPath = null) {
            const list = document.getElementById('responseList');
            
            // 清空空状态提示
            if (stats.reply === 0) {
                list.innerHTML = '';
            }

            const item = document.createElement('div');
            item.className = 'response-item';
            
            let audioBtn = '';
            if (audioPath) {
                const audioPathFixed = audioPath.replace('./', '/');
                const audioUrl = getApiUrl() + audioPathFixed;
                audioBtn = `<button class="audio-btn" onclick="playAudioFromUrl('${audioUrl}', this)">🔊 播放语音</button>`;
            }
            
            item.innerHTML = `
                <div class="response-text">${escapeHtml(text)}</div>
                ${audioBtn}
            `;
            
            list.insertBefore(item, list.firstChild);
            
            // 更新统计
            stats.reply++;
            document.getElementById('totalReply').textContent = stats.reply;
            document.getElementById('replyCount').textContent = `${stats.reply} 条`;
        }

        // 播放音频
        function playAudio(audioPath) {
            if (!audioPath) return;
            
            // audioPath 格式: ./assets/audio/response_xxx.mp3
            // 需要转换为: /assets/audio/response_xxx.mp3
            const audioPathFixed = audioPath.replace('./', '/');
            const audioUrl = getApiUrl() + audioPathFixed;
            playAudioFromUrl(audioUrl);
        }

        function playAudioFromUrl(url, btn = null) {
            // 停止当前音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            currentAudio = new Audio(url);
            currentAudio.play();
            
            if (btn) {
                btn.classList.add('playing');
                btn.textContent = '🔊 播放中...';
            }

            currentAudio.onended = () => {
                if (btn) {
                    btn.classList.remove('playing');
                    btn.textContent = '🔊 播放语音';
                }
                stats.audio++;
                document.getElementById('totalAudio').textContent = stats.audio;
            };

            currentAudio.onerror = () => {
                if (btn) {
                    btn.textContent = '❌ 播放失败';
                }
                showNotification('音频播放失败', true);
            };
        }

        // 更新角色状态
        function updateAvatarStatus(username, content) {
            const statusEl = document.getElementById('avatarStatus');
            
            setTimeout(() => {
                statusEl.textContent = `收到 @${username} 的弹幕: "${content.substring(0, 10)}${content.length > 10 ? '...' : ''}"`;
            }, 500);

            setTimeout(() => {
                statusEl.textContent = '正在回复中... ✨';
            }, 1500);

            setTimeout(() => {
                statusEl.textContent = '回复已发送~ 🎉';
            }, 2500);

            setTimeout(() => {
                statusEl.textContent = '等待下一条弹幕...';
            }, 5000);
        }

        // 清空
        function clearAll() {
            if (confirm('确定要清空所有数据吗？')) {
                document.getElementById('danmuList').innerHTML = `
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 50px;">
                        暂无弹幕，发送一条试试吧~
                    </div>
                `;
                document.getElementById('responseList').innerHTML = `
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 50px;">
                        等待弹幕...
                    </div>
                `;
                stats = { danmu: 0, reply: 0, audio: 0, startTime: Date.now() };
                document.getElementById('totalDanmu').textContent = '0';
                document.getElementById('totalReply').textContent = '0';
                document.getElementById('totalAudio').textContent = '0';
                document.getElementById('danmuCount').textContent = '0 条';
                document.getElementById('replyCount').textContent = '0 条';
                document.getElementById('avatarStatus').textContent = '正在等待互动...';
                showNotification('已清空所有数据');
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 在线时长计时
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - stats.startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('onlineTime').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // 自动播放设置
        document.getElementById('autoPlay').addEventListener('change', (e) => {
            autoPlay = e.target.checked;
        });

        // 回车发送
        document.getElementById('danmuInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendDanmu();
            }
        });

        // 页面加载时测试连接
        window.onload = () => {
            setTimeout(testConnection, 1000);
        };
    </script>
</body>
</html>
